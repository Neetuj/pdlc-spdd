<svg width="100%" viewBox="0 0 680 1020" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PDLC Prompt Library — Discover, Execute, Deliver with activity clusters</title>
  <desc>Three-phase product lifecycle with clustered activities inside each phase.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #222; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; fill: #444; }
      .teal-outer { fill: #E1F5EE; stroke: #1D9E75; }
      .teal-cluster { fill: #9FE1CB; stroke: #1D9E75; }
      .teal-pill { fill: #5DCAA5; stroke: #0F6E56; }
      .purple-outer { fill: #EEEDFE; stroke: #534AB7; }
      .purple-cluster { fill: #CECBF6; stroke: #534AB7; }
      .purple-pill { fill: #AFA9EC; stroke: #3C3489; }
      .coral-outer { fill: #FAECE7; stroke: #993C1D; }
      .coral-cluster { fill: #F5C4B3; stroke: #993C1D; }
      .coral-pill { fill: #F0997B; stroke: #712B13; }
      .pill-text { font-size: 11px; fill: #2a2a2a; }
      .cluster-label { font-size: 11px; font-weight: 500; fill: #333; }
      .phase-label { font-size: 14px; font-weight: 600; fill: #111; }
      .phase-sub { font-size: 11px; fill: #555; }
      .arr { fill: none; stroke: #888; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Title -->
  <text class="phase-label" x="340" y="28" text-anchor="middle">Product lifecycle prompt library</text>
  <text class="ts" x="340" y="46" text-anchor="middle">Every prompt maps to a phase and cluster. Every phase feeds the next.</text>

  <!-- DISCOVER -->
  <rect x="16" y="62" width="204" height="640" rx="14" class="teal-outer" stroke-width="0.5"/>
  <text class="phase-label" x="118" y="84" text-anchor="middle">Discover</text>
  <text class="phase-sub" x="118" y="100" text-anchor="middle">Understand before building</text>

  <rect x="26" y="112" width="184" height="148" rx="8" class="teal-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="118" y="128" text-anchor="middle">Market intelligence</text>
  <rect x="34" y="136" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="153" text-anchor="middle">Win / loss analysis</text>
  <rect x="34" y="168" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="185" text-anchor="middle">Market problems</text>
  <rect x="34" y="200" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="217" text-anchor="middle">Competitive landscape</text>
