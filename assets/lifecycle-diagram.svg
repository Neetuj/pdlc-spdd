  <rect x="26" y="268" width="184" height="180" rx="8" class="teal-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="118" y="284" text-anchor="middle">Strategy</text>
  <rect x="34" y="292" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="309" text-anchor="middle">Market definition</text>
  <rect x="34" y="324" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="341" text-anchor="middle">Market sizing</text>
  <rect x="34" y="356" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
