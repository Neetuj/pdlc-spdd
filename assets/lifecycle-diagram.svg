  <rect x="478" y="168" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="185" text-anchor="middle">Marketing plan</text>
  <rect x="478" y="200" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="217" text-anchor="middle">Sales alignment</text>
  <rect x="478" y="232" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="249" text-anchor="middle">Sales tools</text>
  <rect x="478" y="264" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="281" text-anchor="middle">Channel training</text>
  <rect x="478" y="296" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="313" text-anchor="middle">Awareness</text>
  <rect x="478" y="328" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="345" text-anchor="middle">Nurturing</text>
  <rect x="478" y="360" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="377" text-anchor="middle">Events</text>

  <rect x="470" y="398" width="184" height="154" rx="8" class="coral-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="562" y="414" text-anchor="middle">Measure and grow</text>
  <rect x="478" y="422" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="439" text-anchor="middle">Revenue growth</text>
  <rect x="478" y="454" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="471" text-anchor="middle">Revenue retention</text>
  <rect x="478" y="486" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="503" text-anchor="middle">Advocacy</text>
  <rect x="478" y="518" width="168" height="26" rx="5" class="coral-pill" stroke-width="0.5"/>
  <text class="pill-text" x="562" y="535" text-anchor="middle">Measurement</text>

  <!-- Arrows between phases -->
  <line x1="222" y1="200" x2="236" y2="200" class="arr" marker-end="url(#arrow)" stroke-width="2"/>
  <line x1="444" y1="200" x2="458" y2="200" class="arr" marker-end="url(#arrow)" stroke-width="2"/>

  <!-- Loop arrow -->
  <path d="M562 564 Q562 620 340 648 Q118 676 118 704 L118 704" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="690" text-anchor="middle">Every launch creates new market data</text>
  <text class="ts" x="340" y="708" text-anchor="middle">— feeds back into the next discover cycle</text>

  <!-- Legend -->
  <rect x="16" y="726" width="648" height="50" rx="10" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text class="ts" x="340" y="744" text-anchor="middle">Grounded in the Pragmatic Framework — Market, Focus, Business, Planning, Programs, Enablement, Support</text>
  <rect x="36" y="754" width="10" height="10" rx="2" fill="#5DCAA5"/>
  <text class="ts" x="52" y="763">Discover</text>
  <rect x="200" y="754" width="10" height="10" rx="2" fill="#AFA9EC"/>
  <text class="ts" x="216" y="763">Execute</text>
  <rect x="360" y="754" width="10" height="10" rx="2" fill="#F0997B"/>
  <text class="ts" x="376" y="763">Deliver</text>
</svg>