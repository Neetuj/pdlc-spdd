  <text class="pill-text" x="118" y="437" text-anchor="middle">Distinctive competencies</text>

  <rect x="26" y="456" width="184" height="116" rx="8" class="teal-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="118" y="472" text-anchor="middle">Buyer understanding</text>
  <rect x="34" y="480" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="497" text-anchor="middle">Buyer persona</text>
  <rect x="34" y="512" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="529" text-anchor="middle">Buyer experience</text>
  <rect x="34" y="544" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="561" text-anchor="middle">Distribution strategy</text>

  <rect x="26" y="580" width="184" height="112" rx="8" class="teal-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="118" y="596" text-anchor="middle">GTM direction</text>
  <rect x="34" y="604" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="621" text-anchor="middle">Positioning</text>
  <rect x="34" y="636" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="653" text-anchor="middle">Pricing strategy</text>
  <rect x="34" y="668" width="168" height="26" rx="5" class="teal-pill" stroke-width="0.5"/>
  <text class="pill-text" x="118" y="685" text-anchor="middle">GTM strategy</text>

