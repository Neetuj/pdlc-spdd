  <text class="pill-text" x="340" y="313" text-anchor="middle">Product profitability</text>

  <rect x="248" y="332" width="184" height="150" rx="8" class="purple-cluster" stroke-width="0.5" fill-opacity="0.4"/>
  <text class="cluster-label" x="340" y="348" text-anchor="middle">Delivery planning</text>
