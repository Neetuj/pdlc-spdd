  <text class="cluster-label" x="340" y="128" text-anchor="middle">Product definition</text>
  <rect x="256" y="136" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="153" text-anchor="middle">Market requirements</text>
  <rect x="256" y="168" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="185" text-anchor="middle">User personas</text>
  <rect x="256" y="200" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="217" text-anchor="middle">Use scenarios</text>
  <rect x="256" y="232" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="249" text-anchor="middle">Buy, build or partner</text>
  <rect x="256" y="264" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="281" text-anchor="middle">Innovation</text>
