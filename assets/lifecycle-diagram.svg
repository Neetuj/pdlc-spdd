  <text class="pill-text" x="340" y="373" text-anchor="middle">Roadmap prioritization</text>
  <rect x="256" y="388" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="405" text-anchor="middle">Product roadmap</text>
  <rect x="256" y="420" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="437" text-anchor="middle">Stakeholder comms</text>
  <rect x="256" y="452" width="168" height="26" rx="5" class="purple-pill" stroke-width="0.5"/>
  <text class="pill-text" x="340" y="469" text-anchor="middle">Release planning</text>

